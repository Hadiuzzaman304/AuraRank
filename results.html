<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AuraIndex — AuraRank</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--red:#ff4d6d;--orange:#ff9a3c;--purple:#7c5cbf;--glass:rgba(255,255,255,0.055);--glass-b:rgba(255,255,255,0.13);--bg:#07070f;}
body{min-height:100vh;background:var(--bg);font-family:'Outfit',sans-serif;color:#fff;overflow-x:hidden;display:flex;flex-direction:column;}
.bg{position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse 70% 55% at 15% 15%,rgba(255,77,109,0.13) 0%,transparent 55%),
    radial-gradient(ellipse 65% 55% at 85% 80%,rgba(124,92,191,0.15) 0%,transparent 55%),var(--bg);}
.grain{position:fixed;inset:0;z-index:0;opacity:0.03;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px;}
.orb{position:fixed;border-radius:50%;filter:blur(90px);opacity:0.3;z-index:0;pointer-events:none;animation:float 9s ease-in-out infinite;}
.orb1{width:400px;height:400px;background:rgba(255,77,109,0.26);top:-100px;left:-100px;}
.orb2{width:300px;height:300px;background:rgba(124,92,191,0.28);bottom:-80px;right:-80px;animation-delay:-4s;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-22px);}}

nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:13px 28px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(7,7,15,0.6);backdrop-filter:blur(28px) saturate(1.5);-webkit-backdrop-filter:blur(28px) saturate(1.5);
  border-bottom:1px solid rgba(255,255,255,0.09);}
.nav-logo-wrap{display:flex;flex-direction:column;gap:2px;text-decoration:none;transition:opacity 0.2s;}
.nav-logo-wrap:hover{opacity:0.8;}
.nav-logo{font-size:1.35rem;font-weight:900;letter-spacing:-1.5px;
  background:linear-gradient(130deg,var(--red),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
.nav-tagline{font-size:0.56rem;color:rgba(255,255,255,0.28);letter-spacing:2px;text-transform:uppercase;}
.nav-links{display:flex;gap:4px;}
.nav-link{padding:7px 15px;border-radius:22px;font-size:0.78rem;font-weight:500;
  text-decoration:none;color:rgba(255,255,255,0.55);transition:all 0.22s;border:1px solid transparent;
  font-family:'Outfit',sans-serif;background:none;cursor:pointer;}
.nav-link:hover{color:#fff;background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.1);transform:translateY(-1px);}
.nav-link.active{color:#fff;background:rgba(255,77,109,0.18);border-color:rgba(255,77,109,0.35);box-shadow:0 0 14px rgba(255,77,109,0.15);}

.wrap{position:relative;z-index:1;flex:1;padding:100px 24px 60px;max-width:940px;margin:0 auto;width:100%;}
.page-header{margin-bottom:36px;}
.page-title{font-family:'DM Serif Display',serif;font-size:clamp(2rem,5vw,3rem);font-weight:400;letter-spacing:-0.5px;margin-bottom:6px;
  background:linear-gradient(130deg,var(--red),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.page-sub{color:rgba(255,255,255,0.35);font-size:0.84rem;letter-spacing:0.5px;}

/* ADMIN BUTTON (PDF EXPORT) */
.admin-btn{position:fixed;bottom:24px;right:24px;z-index:200;padding:11px 18px;
  background:rgba(255,154,60,0.1);border:1px solid rgba(255,154,60,0.25);border-radius:22px;
  color:rgba(255,180,100,0.8);font-size:0.75rem;font-weight:600;font-family:'Outfit',sans-serif;
  cursor:pointer;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);transition:all 0.22s;}
.admin-btn:hover{background:rgba(255,154,60,0.22);border-color:rgba(255,154,60,0.5);color:var(--orange);transform:translateY(-1px);}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:32px;}
.stat{background:var(--glass);border:1px solid var(--glass-b);border-radius:22px;padding:22px 20px;text-align:center;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);transition:all 0.25s;cursor:default;
  box-shadow:0 4px 20px rgba(0,0,0,0.18),inset 0 1px 0 rgba(255,255,255,0.06);}
.stat:hover{transform:translateY(-3px);border-color:rgba(255,77,109,0.25);box-shadow:0 10px 32px rgba(0,0,0,0.28);}
.stat-val{font-size:2.2rem;font-weight:900;letter-spacing:-1px;
  background:linear-gradient(130deg,var(--red),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.stat-label{font-size:0.68rem;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:2px;margin-top:4px;font-weight:500;}

.chart-card{background:var(--glass);border:1px solid var(--glass-b);border-radius:26px;padding:28px;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);margin-bottom:28px;
  box-shadow:0 4px 24px rgba(0,0,0,0.2),inset 0 1px 0 rgba(255,255,255,0.06);transition:all 0.25s;}
.chart-card:hover{border-color:rgba(255,255,255,0.15);}
.chart-title{font-size:0.72rem;font-weight:600;color:rgba(255,255,255,0.45);text-align:center;margin-bottom:28px;letter-spacing:2.5px;text-transform:uppercase;}
.chart-area{display:flex;align-items:flex-end;justify-content:center;gap:clamp(6px,1.8vw,14px);padding:0 4px 0;}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;min-width:0;max-width:68px;}
.bar-outer{width:100%;position:relative;}
.bar-track{position:absolute;inset:0;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:40px;}
.bar{position:absolute;bottom:0;left:0;right:0;border-radius:40px;
  background:linear-gradient(0deg,rgba(124,92,191,0.85) 0%,var(--orange) 50%,var(--red) 100%);
  box-shadow:0 0 18px rgba(255,77,109,0.3),0 0 6px rgba(255,154,60,0.2);
  height:0;transition:height 1.1s cubic-bezier(0.34,1.2,0.64,1);cursor:pointer;}
.bar:hover{box-shadow:0 0 28px rgba(255,77,109,0.55),0 0 10px rgba(255,154,60,0.35);filter:brightness(1.12);}
.bar-avg{position:absolute;top:-24px;left:50%;transform:translateX(-50%);font-size:0.68rem;font-weight:700;color:var(--orange);white-space:nowrap;opacity:0;transition:opacity 0.4s 0.8s;}
.bar-avg.visible{opacity:1;}
.bar-avatar{width:clamp(26px,4.5vw,38px);height:clamp(26px,4.5vw,38px);border-radius:50%;object-fit:cover;border:2px solid rgba(255,77,109,0.4);background:rgba(255,255,255,0.07);box-shadow:0 0 10px rgba(255,77,109,0.2);transition:all 0.25s;}
.bar-col:hover .bar-avatar{border-color:rgba(255,77,109,0.8);transform:scale(1.1);}
.bar-name{font-size:clamp(0.5rem,1.3vw,0.64rem);color:rgba(255,255,255,0.4);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}

.section-title{font-size:0.72rem;font-weight:600;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:2.5px;margin-bottom:14px;}
.rank-list{display:flex;flex-direction:column;gap:8px;}
.rank-row{background:var(--glass);border:1px solid var(--glass-b);border-radius:20px;padding:15px 20px;display:grid;grid-template-columns:44px 44px 1fr auto auto;align-items:center;gap:14px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);transition:all 0.25s;cursor:default;}
.rank-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,77,109,0.35);background:rgba(255,255,255,0.07);transition:all 0.25s;}
.rank-row:hover{transform:translateX(4px);border-color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);}
.rank-row.gold{border-color:rgba(255,185,0,0.3);background:rgba(255,185,0,0.05);}
.rank-badge{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.85rem;font-weight:800;background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.38);}
.rank-row.gold .rank-badge{background:rgba(255,185,0,0.18);color:#ffb700;}
.rank-alias{font-size:0.92rem;font-weight:600;margin-bottom:7px;}
.rank-bar-track{height:5px;background:rgba(255,255,255,0.07);border-radius:40px;overflow:hidden;}
.rank-bar-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--orange));border-radius:40px;transition:width 1.3s cubic-bezier(0.34,1.4,0.64,1);}
.rank-responses{font-size:0.68rem;color:rgba(255,255,255,0.28);text-align:right;}
.rank-score{font-size:1.55rem;font-weight:900;background:linear-gradient(130deg,var(--red),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:right;min-width:52px;}

.study-progress{width:100%;margin-bottom:28px;background:var(--glass);border:1px solid var(--glass-b);border-radius:20px;padding:18px 22px;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);}
.sp-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.sp-label{font-size:0.67rem;color:rgba(255,255,255,0.38);letter-spacing:2.5px;text-transform:uppercase;font-weight:500;}
.sp-count{font-size:0.82rem;font-weight:700;background:linear-gradient(130deg,var(--red),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.sp-bar{height:6px;background:rgba(255,255,255,0.06);border-radius:10px;overflow:hidden;}
.sp-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--orange));border-radius:10px;transition:width 0.9s cubic-bezier(0.34,1,0.64,1);}
.sp-fill.done{background:linear-gradient(90deg,#28a745,#20c654);}
.sp-sub{font-size:0.64rem;color:rgba(255,255,255,0.22);margin-top:8px;}

footer{position:relative;z-index:1;padding:16px 28px;text-align:center;background:rgba(7,7,15,0.65);backdrop-filter:blur(28px) saturate(1.5);border-top:1px solid rgba(255,255,255,0.08);}
.footer-name{font-size:0.8rem;font-weight:600;background:linear-gradient(130deg,var(--red),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.footer-meta{font-size:0.7rem;color:rgba(255,255,255,0.3);}
</style>
</head>
<body>
<div class="bg"></div>
<div class="grain"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<nav>
  <a class="nav-logo-wrap" href="index.html">
    <div class="nav-logo">AuraRank</div>
    <div class="nav-tagline">Algorithm-Driven Aura Ranking</div>
  </a>
  <div class="nav-links">
    <a class="nav-link" href="index.html">Home</a>
    <button class="nav-link" onclick="goRate()">Rate</button>
    <a class="nav-link active" href="results.html">AuraIndex</a>
    <a class="nav-link" href="developer.html">Developer</a>
  </div>
</nav>

<div class="wrap">
  <div class="page-header">
    <div class="page-title">AuraIndex</div>
    <div class="page-sub">Average Rating Distribution &amp; Rankings</div>
  </div>

  <div class="study-progress">
    <div class="sp-top">
      <div class="sp-label">Study Progress</div>
      <div class="sp-count" id="spCount">0 / 30 Responses</div>
    </div>
    <div class="sp-bar"><div class="sp-fill" id="spFill" style="width:0%"></div></div>
    <div class="sp-sub" id="spSub">Collecting participant ratings — 30 responses needed</div>
  </div>

  <div id="root"></div>
</div>

<button class="admin-btn" onclick="exportToPDF()">📄 Export Data — PDF</button>

<footer>
  <div class="footer-inner">
    <div class="footer-name">Hadiuzzaman Ome &amp; Team</div>
    <div class="footer-meta">CSE, Daffodil International University</div>
  </div>
</footer>

<script>
function goRate(){
  const pid=localStorage.getItem('fr_current_pid');
  if(pid){window.location.href='rate.html';}
  else{window.location.href='index.html';}
}

const RESPONSE_LIMIT=30;
function updateProgress(){
  const total=Math.min(parseInt(localStorage.getItem('fr_total_responses')||'0',10),RESPONSE_LIMIT);
  const pct=(total/RESPONSE_LIMIT)*100;
  document.getElementById('spCount').textContent=`${total} / ${RESPONSE_LIMIT} Responses`;
  const fill=document.getElementById('spFill');
  fill.style.width=pct+'%';
  if(total>=RESPONSE_LIMIT){
    fill.classList.add('done');
    document.getElementById('spSub').textContent='✓ All responses collected — study is complete';
    document.getElementById('spSub').style.color='rgba(40,167,69,0.7)';
  }else{
    const remaining=RESPONSE_LIMIT-total;
    document.getElementById('spSub').textContent=`${remaining} more response${remaining!==1?'s':''} needed to complete the study`;
  }
}
updateProgress();

const aliases=["Person 01","Person 02","Person 03","Person 04","Person 05","Person 06","Person 07","Person 08","Person 09","Person 10"];
const totals={},counts={};
aliases.forEach(a=>{totals[a]=0;counts[a]=0;});

let participantCount=0,totalRatings=0;

for(let i=0;i<localStorage.length;i++){
  const key=localStorage.key(i);
  if(!key||!key.startsWith('fr_')||key==='fr_current_pid'||key==='fr_total_responses') continue;
  try{
    const data=JSON.parse(localStorage.getItem(key));
    if(!data||!data.ratings) continue;
    const entries=Object.entries(data.ratings);
    if(entries.length===0) continue;
    participantCount++;
    for(const [id,score] of entries){
      const alias=aliases.find(a=>id.startsWith(a));
      if(alias){totals[alias]+=score;counts[alias]++;totalRatings++;}
    }
  }catch(e){continue;}
}

const results=aliases.map(alias=>({
  alias,avg:counts[alias]>0?totals[alias]/counts[alias]:0,responses:counts[alias]
})).sort((a,b)=>b.avg-a.avg);

const root=document.getElementById('root');
if(participantCount===0){
  root.innerHTML=`<div style="text-align:center;padding:80px 20px;color:rgba(255,255,255,0.25);"><h3>No ratings yet</h3></div>`;
}else{
  const overallAvg=totalRatings>0?(Object.values(totals).reduce((a,b)=>a+b,0)/totalRatings).toFixed(2):'—';
  root.innerHTML=`
    <div class="stats">
      <div class="stat"><div class="stat-val">${participantCount}</div><div class="stat-label">Participants</div></div>
      <div class="stat"><div class="stat-val">${totalRatings}</div><div class="stat-label">Total Ratings</div></div>
      <div class="stat"><div class="stat-val">${overallAvg}</div><div class="stat-label">Overall Avg</div></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Average Rating Distribution</div>
      <div class="chart-area">${results.map(r=>{
        const h=Math.round((r.avg/10)*200);
        return `<div class="bar-col"><div class="bar-outer" style="height:${h}px"><div class="bar-track"></div><div class="bar" style="height:100%"><div class="bar-avg visible">${r.avg.toFixed(1)}</div></div></div><div class="bar-name">${r.alias.replace('Person ','P')}</div></div>`;
      }).join('')}</div>
    </div>
    <div class="section-title">Rankings</div>
    <div class="rank-list">${results.map((r,i)=>`<div class="rank-row ${i===0?'gold':''}"><div class="rank-badge">${i+1}</div><div class="rank-info"><div class="rank-alias">${r.alias}</div><div class="rank-bar-track"><div class="rank-bar-fill" style="width:${(r.avg/10)*100}%"></div></div></div><div class="rank-responses">${r.responses} ratings</div><div class="rank-score">${r.avg.toFixed(2)}</div></div>`).join('')}</div>`;
}

// PDF EXPORT FUNCTION
function exportToPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF('l', 'mm', 'a4'); // Landscape for many columns

  // Title
  doc.setFontSize(18);
  doc.text("AuraRank Study Data Report", 14, 20);
  doc.setFontSize(10);
  doc.text(`Generated on: ${new Date().toLocaleString()}`, 14, 28);

  const headers = [["Participant ID", "P01", "P02", "P03", "P04", "P05", "P06", "P07", "P08", "P09", "P10"]];
  const rows = [];

  for(let i=0; i<localStorage.length; i++) {
    const key = localStorage.key(i);
    if(!key || !key.startsWith('fr_') || key==='fr_current_pid' || key==='fr_total_responses') continue;
    
    try {
      const data = JSON.parse(localStorage.getItem(key));
      if(!data || !data.ratings) continue;

      const row = [data.pid || "Unknown"];
      // Map ratings specifically to Person columns
      aliases.forEach(alias => {
        const score = data.ratings[`${alias}-px`] || "N/A";
        row.push(score);
      });
      rows.push(row);
    } catch(e) {}
  }

  // Sort rows by Participant ID for neatness
  rows.sort((a, b) => a[0].localeCompare(b[0]));

  doc.autoTable({
    head: headers,
    body: rows,
    startY: 35,
    theme: 'grid',
    headStyles: { fillColor: [255, 77, 109], textColor: 255 },
    alternateRowStyles: { fillColor: [245, 245, 245] },
    styles: { font: 'helvetica', fontSize: 9 }
  });

  doc.save("AuraRank_Study_Results.pdf");
}
</script>
</body>
</html>

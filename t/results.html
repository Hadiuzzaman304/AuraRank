<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AuraIndex — AuraRank</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--accent:#ff6b6b;--accent2:#ffa94d;--glass:rgba(255,255,255,0.07);--glass-border:rgba(255,255,255,0.15);}
body{min-height:100vh;background:#060612;font-family:'Outfit',sans-serif;color:#fff;overflow-x:hidden;}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 70% 50% at 20% 20%,rgba(255,107,107,0.15) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 80% 80%,rgba(120,80,255,0.15) 0%,transparent 60%),#060612;}
.orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:0.3;z-index:0;pointer-events:none;animation:float 8s ease-in-out infinite;}
.orb1{width:350px;height:350px;background:rgba(255,107,107,0.3);top:-80px;left:-80px;}
.orb2{width:250px;height:250px;background:rgba(120,80,255,0.3);bottom:-60px;right:-60px;animation-delay:-4s;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-20px);}}

nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;background:rgba(6,6,18,0.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.08);}
.nav-logo{font-size:1.3rem;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,#ff6b6b,#ffa94d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none;}
.nav-links{display:flex;gap:8px;}
.nav-link{padding:7px 16px;border-radius:20px;font-size:0.78rem;font-weight:500;text-decoration:none;color:rgba(255,255,255,0.6);transition:all 0.2s;border:1px solid transparent;font-family:'Outfit',sans-serif;background:none;cursor:pointer;}
.nav-link:hover{color:#fff;background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.12);}
.nav-link.active{color:#fff;background:rgba(255,107,107,0.15);border-color:rgba(255,107,107,0.3);}

.wrap{position:relative;z-index:1;padding:100px 20px 60px;max-width:900px;margin:0 auto;}

.page-title{font-size:clamp(1.8rem,5vw,2.5rem);font-weight:800;letter-spacing:-1px;margin-bottom:4px;background:linear-gradient(135deg,#ff6b6b,#ffa94d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.page-sub{color:rgba(255,255,255,0.4);font-size:0.85rem;margin-bottom:36px;}

/* STAT CARDS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:36px;}
.stat{background:var(--glass);border:1px solid var(--glass-border);border-radius:20px;padding:20px;text-align:center;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}
.stat-val{font-size:2rem;font-weight:800;background:linear-gradient(135deg,#ff6b6b,#ffa94d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.stat-label{font-size:0.72rem;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1.5px;margin-top:4px;}

/* BAR CHART */
.chart-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:24px;padding:28px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);margin-bottom:32px;overflow:hidden;}
.chart-title{font-size:0.85rem;font-weight:600;color:rgba(255,255,255,0.7);text-align:center;margin-bottom:24px;letter-spacing:1px;text-transform:uppercase;}
.chart-area{display:flex;align-items:flex-end;justify-content:center;gap:clamp(6px,2vw,16px);height:200px;padding-bottom:0;}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;min-width:0;max-width:70px;}
.bar-wrap{width:100%;display:flex;flex-direction:column;justify-content:flex-end;height:180px;}
.bar{
  width:100%;border-radius:10px 10px 4px 4px;
  background:linear-gradient(180deg,#ff6b6b,rgba(120,80,255,0.8));
  min-height:4px;transition:height 1s cubic-bezier(0.34,1.56,0.64,1);
  position:relative;cursor:pointer;
}
.bar:hover{filter:brightness(1.2);}
.bar-avg{
  position:absolute;top:-22px;left:50%;transform:translateX(-50%);
  font-size:0.68rem;font-weight:700;color:#ffa94d;white-space:nowrap;
}
.bar-avatar{
  width:clamp(28px,5vw,40px);height:clamp(28px,5vw,40px);
  border-radius:50%;object-fit:cover;
  border:2px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.1);
  flex-shrink:0;
}
.bar-name{font-size:clamp(0.55rem,1.5vw,0.68rem);color:rgba(255,255,255,0.5);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}

/* RANKINGS TABLE */
.section-title{font-size:1rem;font-weight:700;color:rgba(255,255,255,0.8);margin-bottom:16px;}
.rank-list{display:flex;flex-direction:column;gap:10px;}
.rank-row{
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:18px;padding:16px 20px;
  display:grid;grid-template-columns:44px 1fr auto auto;
  align-items:center;gap:16px;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  transition:all 0.2s;
}
.rank-row:hover{border-color:rgba(255,255,255,0.25);background:rgba(255,255,255,0.09);}
.rank-row.gold{border-color:rgba(255,180,0,0.35);background:rgba(255,180,0,0.06);}
.rank-row.silver{border-color:rgba(180,180,220,0.25);}
.rank-row.bronze{border-color:rgba(205,127,50,0.25);}

.rank-badge{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:0.85rem;font-weight:800;
  background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.4);
  flex-shrink:0;
}
.rank-row.gold .rank-badge{background:rgba(255,180,0,0.2);color:#ffb400;}
.rank-row.silver .rank-badge{background:rgba(180,180,220,0.15);color:#b4b4dc;}
.rank-row.bronze .rank-badge{background:rgba(205,127,50,0.15);color:#cd7f32;}

.rank-info{}
.rank-alias{font-size:0.95rem;font-weight:600;margin-bottom:6px;}
.rank-bar-track{height:4px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden;}
.rank-bar-fill{height:100%;background:linear-gradient(90deg,#ff6b6b,#ffa94d);border-radius:4px;transition:width 1.2s cubic-bezier(0.34,1.56,0.64,1);}

.rank-responses{font-size:0.72rem;color:rgba(255,255,255,0.35);text-align:right;white-space:nowrap;}
.rank-score{font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,#ff6b6b,#ffa94d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:right;min-width:50px;}

.no-data{text-align:center;padding:80px 20px;color:rgba(255,255,255,0.3);}
.no-data h3{font-size:1.4rem;font-weight:700;margin-bottom:10px;color:rgba(255,255,255,0.5);}

@media(max-width:600px){
  .stats{grid-template-columns:1fr 1fr;}
  .stats .stat:last-child{grid-column:1/-1;}
  .rank-row{grid-template-columns:36px 1fr auto;gap:10px;}
  .rank-responses{display:none;}
  .chart-area{gap:4px;}
}
@media(max-width:400px){
  .nav-link:not(.active) span{display:none;}
}
</style>
</head>
<body>
<div class="bg"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<nav>
  <a class="nav-logo" href="index.html">AuraRank</a>
  <div class="nav-links">
    <a class="nav-link" href="index.html">Home</a>
    <a class="nav-link" href="rate.html">Rate</a>
    <a class="nav-link active" href="results.html">AuraIndex</a>
    <a class="nav-link" href="developer.html">Dev</a>
  </div>
</nav>

<div class="wrap">
  <div class="page-title">AuraIndex</div>
  <div class="page-sub">Average Rating Distribution & Rankings</div>
  <div id="root"></div>
</div>

<script>
const aliases=["Person 01","Person 02","Person 03","Person 04","Person 05","Person 06","Person 07","Person 08","Person 09","Person 10"];
const totals={},counts={};
aliases.forEach(a=>{totals[a]=0;counts[a]=0;});

let participantCount=0,totalRatings=0;

for(let i=0;i<localStorage.length;i++){
  const key=localStorage.key(i);
  if(!key||!key.startsWith('fr_')||key==='fr_current_pid') continue;
  try{
    const data=JSON.parse(localStorage.getItem(key));
    if(!data||!data.ratings) continue;
    const entries=Object.entries(data.ratings);
    if(entries.length===0) continue;
    participantCount++;
    for(const [id,score] of entries){
      const alias=aliases.find(a=>id.startsWith(a));
      if(alias){totals[alias]+=score;counts[alias]++;totalRatings++;}
    }
  }catch(e){continue;}
}

const results=aliases.map(alias=>({
  alias,
  avg:counts[alias]>0?totals[alias]/counts[alias]:0,
  responses:counts[alias]
})).sort((a,b)=>b.avg-a.avg);

const root=document.getElementById('root');

if(participantCount===0){
  root.innerHTML=`<div class="no-data"><h3>No data yet</h3><p>Ratings will appear here after participants submit.<br/>All participants must use the same browser/device.</p></div>`;
}else{
  const overallAvg=totalRatings>0?(Object.values(totals).reduce((a,b)=>a+b,0)/totalRatings).toFixed(2):'—';
  const top=results[0];

  // STAT CARDS
  const statsHTML=`
    <div class="stats">
      <div class="stat"><div class="stat-val">${participantCount}</div><div class="stat-label">Participants</div></div>
      <div class="stat"><div class="stat-val">${totalRatings}</div><div class="stat-label">Total Ratings</div></div>
      <div class="stat"><div class="stat-val">${overallAvg}</div><div class="stat-label">Overall Avg</div></div>
    </div>`;

  // BAR CHART — ordered by alias for consistency in chart
  const chartOrdered=[...results].sort((a,b)=>b.avg-a.avg);
  const maxAvg=Math.max(...chartOrdered.map(r=>r.avg),1);

  const bars=chartOrdered.map((r,i)=>{
    const pct=r.avg>0?(r.avg/10)*100:0;
    const heightPct=r.avg>0?(r.avg/maxAvg)*100:2;
    // Use first image of each person as avatar
    const personNum=r.alias.split(' ')[1];
    const avatarSrc=`celebrities/P${personNum}_1.png`;
    const shortName=r.alias.replace('Person ','P');
    return `
      <div class="bar-col">
        <div class="bar-wrap">
          <div class="bar" style="height:${heightPct}%" title="${r.alias}: ${r.avg.toFixed(2)}">
            <div class="bar-avg">${r.avg>0?r.avg.toFixed(1):''}</div>
          </div>
        </div>
        <img class="bar-avatar" src="${avatarSrc}" alt="${r.alias}" onerror="this.style.background='rgba(255,107,107,0.2)'"/>
        <div class="bar-name">${shortName}</div>
      </div>`;
  }).join('');

  const chartHTML=`
    <div class="chart-card">
      <div class="chart-title">Average Rating Distribution</div>
      <div class="chart-area">${bars}</div>
    </div>`;

  // RANKINGS
  const rows=results.map((r,i)=>{
    const cls=i===0?'gold':i===1?'silver':i===2?'bronze':'';
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':`#${i+1}`;
    const pct=(r.avg/10)*100;
    return `
      <div class="rank-row ${cls}">
        <div class="rank-badge">${medal}</div>
        <div class="rank-info">
          <div class="rank-alias">${r.alias}</div>
          <div class="rank-bar-track"><div class="rank-bar-fill" style="width:0%" data-w="${pct.toFixed(1)}"></div></div>
        </div>
        <div class="rank-responses">${r.responses} rating${r.responses!==1?'s':''}</div>
        <div class="rank-score">${r.avg>0?r.avg.toFixed(2):'—'}</div>
      </div>`;
  }).join('');

  root.innerHTML=statsHTML+chartHTML+`<div class="section-title">Rankings</div><div class="rank-list">${rows}</div>`;

  // Animate bars after render
  setTimeout(()=>{
    document.querySelectorAll('.rank-bar-fill').forEach(el=>{
      el.style.width=el.dataset.w+'%';
    });
  },100);
}
</script>
</body>
</html>
